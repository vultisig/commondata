syntax = "proto3";

package vultisig.keysign.v1;

option go_package = "github.com/vultisig/commondata/go/vultisig/keysign/v1;v1";
option java_package = "vultisig.keysign.v1";
option swift_prefix = "VS";

message CosmosCoin {
  string denom = 1;
  string amount = 2;
}

message CosmosFee {
  repeated CosmosCoin amount = 1;
  string gas = 2;
  optional string payer = 3;
  optional string granter = 4;
  optional string fee_payer = 5;
}

message CosmosMsg {
  string type = 1;
  string value = 2;
}

message SignAmino {
  CosmosFee fee = 1;
  repeated CosmosMsg msgs = 2;
}

message SignDirect {
  string body_bytes = 1;
  string auth_info_bytes = 2;
  string chain_id = 3;
  string account_number = 4;
}

message SignSolana {
  repeated string raw_transactions = 1; // base64 encoded transactions
}

message TonMessage {
  string to = 1;
  string amount = 2;
  optional string payload = 3;
}

message SignTon {
  repeated TonMessage ton_messages = 2;
}

message WasmExecuteContractPayload {
  string sender_address = 1;
  string contract_address = 2;
  string execute_msg = 3;
  repeated CosmosCoin coins = 4;
}

// A single Bitcoin transaction input decomposed from a PSBT.
// Contains all data needed for sighash computation and verification.
message BitcoinInput {
  string hash = 1;                   // Previous txid (hex, big-endian)
  uint32 index = 2;                  // Previous output index (vout)
  int64 amount = 3;                  // Satoshis (from witness UTXO)
  string script_pub_key = 4;         // Hex scriptPubKey of the UTXO being spent
  string script_type = 5;            // "p2wpkh", "p2pkh", "p2tr", "p2sh-p2wpkh"
  uint32 sighash_type = 6;           // BIP-143/341 sighash flag (default SIGHASH_ALL=1)
  bool is_ours = 7;                  // Whether this device signs this input
  optional string redeem_script = 8; // For P2SH-P2WPKH: hex redeem script
  uint32 sequence = 9;               // nSequence (default 0xFFFFFFFF)
}

// A single Bitcoin transaction output decomposed from a PSBT.
message BitcoinOutput {
  int64 amount = 1;                   // Satoshis
  string address = 2;                 // Decoded address (empty for OP_RETURN)
  optional string op_return_data = 3; // Hex data if OP_RETURN
  string script_pub_key = 4;          // Hex output scriptPubKey
  bool is_change = 5;                 // Whether output is change back to sender
}

// Structured PSBT representation for Bitcoin dApp signing.
// Decomposes a BIP-174 PSBT into verifiable fields so co-signing
// devices can display transaction details and compute exact sighashes
// without receiving an opaque blob.
message SignBitcoin {
  uint32 version = 1;                 // Transaction version (typically 1 or 2)
  uint32 locktime = 2;                // Transaction locktime
  repeated BitcoinInput inputs = 3;   // All inputs in exact PSBT order
  repeated BitcoinOutput outputs = 4; // All outputs in exact PSBT order
}
