syntax = "proto3";
package vultisig.keysign.v1;

import "vultisig/keysign/v1/coin.proto";

option go_package = "github.com/vultisig/commondata/go/vultisig/keysign/v1;v1";
option java_package = "vultisig.keysign.v1";
option swift_prefix = "VS";

message OneInchTransaction {
  string from = 1;
  string to = 2;
  string data = 3;
  string value = 4;
  string gas_price = 5;
  int64 gas = 6;
  string swap_fee = 7;
  // Coin context for `swap_fee`. The amount alone is not enough because
  // providers attribute the fee to different coins (e.g. KyberSwap charges
  // it in the destination token; LI.FI / 1inch / SwapKit charge it in the
  // source chain's fee coin). Receivers need these fields to compute the
  // correct fiat-equivalent value. All three are optional for backwards
  // compatibility with senders that do not yet populate them.
  optional string swap_fee_chain = 8;
  optional string swap_fee_token_id = 9;
  optional int32 swap_fee_decimals = 10;
}
message OneInchQuote {
  string dst_amount = 1;
  OneInchTransaction tx = 2;
}

message OneInchSwapPayload {
  Coin from_coin = 1;
  Coin to_coin = 2;
  string from_amount = 3;
  string to_amount_decimal = 4;
  OneInchQuote quote = 5;
  string provider = 6;
}
