syntax = "proto3";
package vultisig.keysign.v1;

option go_package = "github.com/vultisig/commondata/go/vultisig/keysign/v1;v1";
option java_package = "vultisig.keysign.v1";
option swift_prefix = "VS";

message CardanoTokenAsset {
  string policy_id = 1;
  string asset_name_hex = 2;
  string amount = 3;
}

message UtxoInfo {
  string hash = 1;
  int64 amount = 2;
  uint32 index = 3;
  repeated CardanoTokenAsset cardano_tokens = 4;
}
